spring.application.name=PetCare-Backend

server.port=${SERVER_PORT:8090}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
server.tomcat.max-swallow-size=100MB
server.tomcat.max-http-form-post-size=100MB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# --- Resend (Email) ---
# Las claves se inyectan via @Value en ResendConfig
# RESEND_API_KEY, FRONTEND_URL se configuran como variables de entorno

app.mail.enabled=${MAIL_ENABLED:false}

security.jwt.secret=${JWT_SECRET:UGV0Q2FyZS1EZXZlbG9wbWVudC1KMFQtU2VjcmV0LTIwMjYtU3VwZXItU2VndXJhLUNhbWJpYXJFbkVudg==}
security.jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:3600000}
security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# --- Base de Datos ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/petcare?sslmode=disable}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false