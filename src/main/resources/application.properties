spring.application.name=PetCare-Backend

server.port=${SERVER_PORT:8090}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
server.tomcat.max-swallow-size=100MB
server.tomcat.max-http-form-post-size=100MB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# --- Email (Gmail SMTP) ---
# Si usas puerto 587: spring.mail.port=587, spring.mail.properties.mail.smtp.starttls.enable=true
# Si usas puerto 465: spring.mail.port=465, spring.mail.properties.mail.smtp.starttls.enable=false, spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_TIMEOUT:30000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:30000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_TIMEOUT:30000}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

# --- Email (MailFrom) ---
mail.from=${MAIL_FROM:}

security.jwt.secret=${JWT_SECRET:UGV0Q2FyZS1EZXZlbG9wbWVudC1KMFQtU2VjcmV0LTIwMjYtU3VwZXItU2VndXJhLUNhbWJpYXJFbkVudg==}
security.jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:3600000}
security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# --- Base de Datos ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/petcare?sslmode=disable}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false